<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benvenuto - Z-Volta</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
    <link rel="stylesheet" href="./CSS/landing.css">
</head>
<body>

    <div id="global-loader">
        <div class="spinner"></div>
    </div>

    <div class="landing-container glass-panel">
        
        <div class="landing-visual">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
            <div class="glass-overlay"></div>
        </div>

        <div class="landing-content">
            
            <header class="landing-header">
                <nav class="top-nav">
                    <a href="#" class="active">Home</a>
                    <a href="chisiamo.html">Chi Siamo</a>
                </nav>
                <div class="logo-container">
                    <img src="./assets/logozvolta.png" alt="Z-Volta Logo" class="brand-logo">
                </div>
            </header>

            <main class="hero-section">
                <h1 class="hero-title">Gestione Spazi<br><span class="text-accent">Z-VOLTA</span></h1>
                <p class="hero-text">
                    Ottimizza l'organizzazione del tuo ufficio. Prenota scrivanie, sale riunioni e posti auto in tempo reale attraverso una piattaforma intelligente, sicura e dal design immersivo. Il futuro del workspace ibrido inizia da qui.
                </p>
                
                <div class="hero-actions">
                    <a href="index.html" class="btn-primary">Accedi al Portale <i class="fas fa-arrow-right"></i></a>
                </div>
            </main>

        </div>
    </div>

    <script>
        window.addEventListener('load', function() {
            const loader = document.getElementById('global-loader');
            if (loader) {
                loader.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
